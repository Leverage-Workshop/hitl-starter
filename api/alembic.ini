# Alembic configuration for the Halberd & Co FastAPI service.
# Migrations are run from the api/ directory: `alembic upgrade head`.
# The database URL is loaded from settings (API_DATABASE_URL, postgresql+asyncpg://)
# inside alembic/env.py — it is intentionally NOT hardcoded here.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
